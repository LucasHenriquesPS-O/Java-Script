<!DOCTYPE html>
<html lang="pt-br">
<head>
<!-- 
Primeiros passos com DOM
    Por marca => getElementsByTagName()
        inertext = so o testo sem formatação
        innerHTML = texto com formatação
    Por Id => getElementById()
    Por Nome => getElementsByName()
    Por Classe => getElementsByClassName()
    Por Seletor => querySelector() / querySelectorAll()
id == #
classic == .
-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #88c0ee;
            color: #000000;
            font: normal 18pt arial
        }
    </style>
</head>
<body>
    <h1> Iniciando estudos DOM</h1>
    <p> Aqui vai o Resultado</p>
    <p> Aprendendo a usar o <strong>DOM</strong> em JavaScript.</p>
    <div id="msg"> Clique em mim </div>
    <script>
        var corpo = document.body
        var p1 = document.getElementsByTagName('p')[1]
        /*
        var d = document. getElementsByTagName('msg')
        d.style.background = 'green'
        d.innerText = ' Estou aguardando ... '
        */
        var d = document.querySelector('#msg')
        d.style.color = 'blue'
    </script>
</body>
</html>
