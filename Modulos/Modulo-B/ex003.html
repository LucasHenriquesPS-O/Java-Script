<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{ 
            font: 20pt Arial;
        }
    </style>
</head>
<body>
    <h1> hello world</h1>
    <p> testando JS </p>
    <script>
        nome = prompt('Qual e seu nome?')
        document.writeln (`Seu nome tem ${nome.length} letras`)
        document.writeln (`Seu nome em maiusculo fica ${nome.toUpperCase()}`)
        document.writeln (`Seu nome em minusculo fica ${nome.toLowerCase()}`)
        /* 
        tofixed() | Metodo para arredondar um numero ou colocar casas decimais
        tolocaleString() | Metodo para converter um numero para string e formatar o numero de acordo com a localidade do usuario
        */
    </script>
</body>
</html>
