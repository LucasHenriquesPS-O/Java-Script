<!-- Operadores 
ARITIMÉTICOS
    + Adição (5+2 = 7)
    - Subtração (5-2 = 3)
    * Multiplicação (5*2 = 10)
    / Divisão (5/2 = 2.5)
    % Resto da divisão Inteira (5%2 = 1)
    ** Exponenciação (5**2 = 25)
ATRIBUIÇÃO
    = Atribuição (x = 5)
    += Adição e atribuição (x += 5 é o mesmo que x = x + 5)
    -= Subtração e atribuição (x -= 5 é o mesmo que x = x - 5)
    *= Multiplicação e atribuição (x *= 5 é o mesmo que x = x * 5)
    /= Divisão e atribuição (x /= 5 é o mesmo que x = x / 5)
    %= Resto da divisão inteira e atribuição (x %= 5 é o mesmo que x = x % 5)
    **= Exponenciação e atribuição (x **= 5 é o mesmo que x = x ** 5)
Incremento
    ++ Incremento (x++ é o mesmo que x = x + 1)
    -- Decremento (x-- é o mesmo que x = x - 1)
-->
